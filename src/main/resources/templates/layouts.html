<div th:fragment="sidebar" class="div1 bg-[#18181B] rounded-lg" id="sidebar">
  <div
    class="sidebar-header flex items-center justify-between p-4 border-b border-[#27272A]"
  >
    <div class="flex items-center gap-3 min-w-0 overflow-hidden">
      <svg
        class="h-6 w-6 text-[#2563EB] flex-shrink-0"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
        />
      </svg>
      <span class="text-[#FAFAFA] font-bold whitespace-nowrap sidebar-text"
        >Mi Panel</span
      >
    </div>
    <button
      id="toggleSidebar"
      class="text-[#A1A1AA] hover:text-[#FAFAFA] transition-colors p-1.5 rounded-lg hover:bg-[#27272A] hidden lg:block flex-shrink-0"
    >
      <svg
        class="h-5 w-5"
        id="toggleIcon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </button>
    <button
      id="closeSidebar"
      class="text-[#A1A1AA] hover:text-[#FAFAFA] transition-colors p-1.5 rounded-lg hover:bg-[#27272A] lg:hidden flex-shrink-0"
    >
      <svg
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
